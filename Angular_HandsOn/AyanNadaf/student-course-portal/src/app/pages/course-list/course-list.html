<h2>Available Courses</h2>

<div *ngIf="loading$ | async">Loading courses...</div>
<div *ngIf="error$ | async as error">{{ error }}</div>

<div class="course-list" *ngIf="!(loading$ | async)">
  <app-course-card
    *ngFor="let course of courses$ | async; trackBy: trackByCourseId"
    [course]="course"
    (enrollRequested)="onEnroll($event)"
  ></app-course-card>
</div>

<p>Selected Course ID: {{ selectedCourseId }}</p>
