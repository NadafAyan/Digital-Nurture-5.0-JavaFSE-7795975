<article class="course-card" appHighlight [highlightColor]="'#f59e0b'">
  <h3>{{ course.name }}</h3>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>
  <p><strong>Grade Status:</strong> {{ course.gradeStatus }}</p>
  <button type="button" (click)="onEnroll()">
    {{ enrollmentService.isEnrolled(course.id) ? 'Unenroll' : 'Enroll' }}
  </button>
</article>
