<form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Student Name</label>
    <input formControlName="studentName" />
    <small *ngIf="enrollmentForm.get('studentName')?.hasError('required') && enrollmentForm.get('studentName')?.touched">Name is required.</small>
    <small *ngIf="enrollmentForm.get('studentName')?.hasError('minlength')">Name must be at least 3 characters.</small>
  </div>

  <div>
    <label>Student Email</label>
    <input formControlName="studentEmail" />
    <small *ngIf="enrollmentForm.get('studentEmail')?.hasError('required') && enrollmentForm.get('studentEmail')?.touched">Email is required.</small>
    <small *ngIf="enrollmentForm.get('studentEmail')?.hasError('email')">Enter a valid email.</small>
    <small *ngIf="enrollmentForm.get('studentEmail')?.hasError('invalidEmail')">Email contains test@ and is not allowed.</small>
  </div>

  <div>
    <label>Course Code</label>
    <input formControlName="courseCode" />
    <small *ngIf="enrollmentForm.get('courseCode')?.hasError('invalidCourseCode')">Course code cannot start with XX.</small>
  </div>

  <div>
    <label>Preferred Semester</label>
    <input formControlName="semester" />
  </div>

  <div>
    <label>
      <input type="checkbox" formControlName="agreeToTerms" />
      Agree to Terms
    </label>
  </div>

  <div formArrayName="additionalCourses">
    <div *ngFor="let course of additionalCoursesArray.controls; let i = index">
      <label>Additional Course {{ i + 1 }}</label>
      <input [formControlName]="i" />
      <button type="button" (click)="removeCourse(i)">Remove</button>
    </div>
  </div>

  <button type="button" (click)="addCourse()">Add Course</button>
  <button type="submit" [disabled]="enrollmentForm.invalid">Submit</button>
</form>
